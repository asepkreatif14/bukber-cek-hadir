<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live RSVP - Bukber 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #eab308; 
            --emerald: #064e3b; 
            --dark: #020617; 
            --glass: rgba(255, 255, 255, 0.03); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Diubah agar tidak terlalu ketat di tengah jika konten banyak */
            padding: 40px 20px; 
            overflow-x: hidden; 
        }

        .stars { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle at 50% 50%, #064e3b44 0%, #020617 100%); 
            z-index: -1; 
        }

        .wrapper { 
            width: 100%; 
            max-width: 1000px; 
            display: grid; 
            grid-template-columns: 1fr 380px; 
            gap: 30px; 
            align-items: start;
        }

        /* Dashboard */
        .dashboard { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 40px; 
            padding: 40px; 
        }

        .header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 3rem; 
            margin-bottom: 10px; 
            line-height: 1.2;
        }

        .header span { color: var(--gold); }

        /* List Styling */
        .p-list { 
            margin-top: 30px; 
            max-height: 500px; 
            overflow-y: auto; 
            padding-right: 10px; 
        }

        /* Custom Scrollbar */
        .p-list::-webkit-scrollbar { width: 5px; }
        .p-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .p-card { 
            background: rgba(255,255,255,0.02); 
            padding: 15px; 
            border-radius: 18px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border: 1px solid rgba(255,255,255,0.05); 
            animation: fadeIn 0.5s ease both; 
        }

        .avatar { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            background: var(--gold); 
            color: black; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            flex-shrink: 0; /* Agar avatar tidak gepeng */
        }

        /* Form */
        .rsvp-form { 
            background: linear-gradient(145deg, #064e3b, #022c22); 
            padding: 45px 35px; 
            border-radius: 40px; 
            border: 1px solid rgba(234, 179, 8, 0.2); 
            text-align: center;
            position: sticky;
            top: 40px; /* Form akan mengikuti saat scroll */
        }

        .rsvp-form h2 { margin-bottom: 10px; }

        input { 
            width: 100%; 
            padding: 16px; 
            margin: 10px 0 15px; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; 
            color: white; 
            outline: none; 
            font-family: inherit;
        }

        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(234, 179, 8, 0.2); }

        .btn-glow { 
            width: 100%; 
            padding: 18px; 
            background: var(--gold); 
            color: black; 
            border: none; 
            border-radius: 15px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px;
        }

        .btn-glow:hover { transform: translateY(-3px); background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-glow:disabled { opacity: 0.6; cursor: not-allowed; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @media (max-width: 900px) { 
            .wrapper { grid-template-columns: 1fr; } 
            .rsvp-form { position: static; }
            .header h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="wrapper">
        <div class="dashboard">
            <div class="header">
                <p style="color: var(--gold); font-weight: 600; letter-spacing: 2px; font-size: 11px; margin-bottom: 5px;">LIVE GUEST LIST</p>
                <h1>Ramadan <span>Bukber.</span></h1>
            </div>
            <div id="pList" class="p-list">
                <p style="opacity: 0.5;">Memuat daftar tamu...</p>
            </div>
        </div>

        <div class="rsvp-form">
            <h2>Reservasi Kursi</h2>
            <p style="font-size: 13px; color: #a7f3d0; margin-bottom: 25px;">Data Anda akan langsung muncul secara realtime.</p>
            
            <form id="rsvpForm">
                <input type="text" name="pendaftar_nama" placeholder="Nama Lengkap" required>
                <input type="tel" name="pendaftar_kontak" placeholder="Nomor WhatsApp (62xxx)" required>
                <button type="submit" class="btn-glow">KONFIRMASI SEKARANG</button>
            </form>
        </div>
    </div>

    <script>
        // Masukkan URL Google Apps Script Anda di sini
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzr99FXIF8vmZLE2neCsPUuVlC7EmVOymUhzVWI_PIDmjmY3punouAvo5Ys3pjHOl9t/exec"; 

        async function loadData() {
            const list = document.getElementById('pList');
            try {
                const response = await fetch(SCRIPT_URL);
                const names = await response.json();
                
                list.innerHTML = ""; 

                if (names.length === 0) {
                    list.innerHTML = "<p style='opacity:0.5'>Belum ada tamu terdaftar.</p>";
                    return;
                }
                
                // Membalik urutan agar yang terbaru di atas
                [...names].reverse().forEach(name => {
                    const card = document.createElement('div');
                    card.className = 'p-card';
                    card.innerHTML = `
                        <div class="avatar">${name.charAt(0).toUpperCase()}</div>
                        <div>
                            <p style="font-weight: 600; text-transform: capitalize;">${name}</p>
                            <p style="font-size: 11px; color: #10b981;">• Terkonfirmasi</p>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                list.innerHTML = "<p>Gagal memuat daftar. Pastikan URL Script benar.</p>";
            }
        }

        document.getElementById('rsvpForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = "Memproses...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            
            try {
                // Gunakan mode no-cors jika mengalami kendala CORS, 
                // tapi fetch biasa lebih baik jika backend mendukung
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: formData
                });
                
                alert("Sukses! Nama Anda telah terdaftar.");
                e.target.reset();
                loadData(); 
            } catch (err) {
                alert("Terjadi kesalahan teknis.");
                console.error(err);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        // Load data pertama kali
        window.onload = loadData;
    </script>
</body>
</html>
